<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width: 100px;">
        </div>
        <button id="close-sidebar" class="close-btn" style="background:none; border:none; color:white; font-size:35px; cursor:pointer;">&times;</button>
    </div>
    
    <a href="/dashboard">Dashboard</a>
    <a href="/expenses">Expenses</a>
    <a href="/reports">Reports</a>
</div>

<div id="sidebar-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;"></div>

<div class="main">
    <button id="sidebar-toggle" class="toggle-btn">☰ Menu</button>

    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>Total Expenses</h3>
            <p>₹{{ total }}</p>
        </div>

        <div class="card">
            <h3>Total Entries</h3>
            <p>{{ expenses|length }}</p>
        </div>
    </div>

    <form action="/add" method="POST" class="form">
        <input name="title" placeholder="Expense name" required>
        <input name="amount" placeholder="Amount ₹" required>
        <button type="submit" style="background-color: #6366f1;">Add</button>
    </form>

    <ul class="list">
        {% for e in expenses %}
        <li>
            {{ e[1] }} - ₹{{ e[2] }}
            <a href="/delete/{{ e[0] }}">❌</a>
        </li>
        {% endfor %}
    </ul>

    <div style="position: relative; height:40vh; width:100%">
        <canvas id="expenseChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const labels = {{ labels|safe }};
        const data = {{ values|safe }};
        const ctx = document.getElementById('expenseChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Expenses ₹',
                    data: data,
                    backgroundColor: '#6366f1'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>

   <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        const closeBtn = document.getElementById('close-sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function openMenu() {
            sidebar.classList.add('active');
            overlay.style.display = 'block';
        }

        function closeMenu() {
            sidebar.classList.remove('active');
            overlay.style.display = 'none';
        }

        // Toggle button click logic
        toggleBtn.addEventListener('click', () => {
            // Agar desktop par hai toh slide karega, mobile par hai toh active hoga
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('hidden');
            } else {
                openMenu();
            }
        });

        closeBtn.addEventListener('click', closeMenu);
        overlay.addEventListener('click', closeMenu);
    </script>
</div>

</body>
</html>
