<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #020617;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: #94a3b8;
    text-decoration: none;
    margin: 10px 0;
}

.sidebar a:hover {
    color: white;
}

/* Main */
.main {
    flex: 1;
    padding: 30px;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}

/* Form */
.form {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.form input {
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #334155;
    color: white;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}

/* List */
.list {
    list-style: none;
    padding: 0;
}

.list li {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    background: #1e293b;
    margin: 8px 0;
    border-radius: 6px;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>💰 Tracker</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/expenses">Expenses</a>
    <a href="/reports">Reports</a>
</div>

<!-- Main -->
<div class="main">

    <h1>Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Expenses</h3>
            <p>₹{{ total }}</p>
        </div>

        <div class="card">
            <h3>Total Entries</h3>
            <p>{{ expenses|length }}</p>
        </div>
    </div>

    <!-- Form -->
    <form action="/add" method="POST" class="form">
        <input name="title" placeholder="Expense name" required>
        <input name="amount" placeholder="Amount ₹" required>
        <button>Add</button>
    </form>

    <!-- List -->
    <ul class="list">
        {% for e in expenses %}
        <li>
            {{ e[1] }} - ₹{{ e[2] }}
            <a href="/delete/{{ e[0] }}">❌</a>
        </li>
        {% endfor %}
    </ul>

    <canvas id="expenseChart" height="100"></canvas>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <script>
            const labels = {{ labels|safe }};
            const data = {{ values|safe }};

            const ctx = document.getElementById('expenseChart').getContext('2d');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Expenses ₹',
                        data: data,
                        backgroundColor: '#6366f1'
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        </script>

</div>

</body>
</html>
