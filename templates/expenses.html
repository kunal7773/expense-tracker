<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Manager - All Expenses</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width: 100px;">
        </div>
        <button id="close-sidebar" class="close-btn" style="background:none; border:none; color:white; font-size:35px; cursor:pointer;">&times;</button>
    </div>
    
    <a href="/dashboard">Dashboard</a>
    <a href="/expenses">Expenses</a>
    <a href="/reports">Reports</a>
</div>

<div id="sidebar-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;"></div>

<div class="main">
    <button id="sidebar-toggle" class="toggle-btn">☰ Menu</button>

    <h1>All Expenses</h1>

    <ul class="list">
        {% for e in expenses %}
        <li>
            <span>{{ e[1] }} - ₹{{ e[2] }}</span>
            <a href="/delete/{{ e[0] }}" style="text-decoration: none;">❌</a>
        </li>
        {% endfor %}
    </ul>

    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        const closeBtn = document.getElementById('close-sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function openMenu() {
            sidebar.classList.add('active');
            overlay.style.display = 'block';
        }

        function closeMenu() {
            sidebar.classList.remove('active');
            overlay.style.display = 'none';
        }

        toggleBtn.addEventListener('click', openMenu);
        closeBtn.addEventListener('click', closeMenu);
        overlay.addEventListener('click', closeMenu);
    </script>
</div>

</body>
</html>
